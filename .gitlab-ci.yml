stages:
  - install
  - type-check
  - lint
  #- test
  - build-docker-image
  - e2e
  - push-docker-image

.node_modules-cache: &node_modules-cache
  key:
    files:
      - package-lock.json
  paths:
    - node_modules
    - cache/Cypress
  policy: pull

default:
  image: cypress/browsers

variables:
  CYPRESS_CACHE_FOLDER: '$CI_PROJECT_DIR/cache/Cypress'

install-job:
  stage: install
  tags:
    - elevation-app
  cache:
    <<: *node_modules-cache
    policy: pull-push
  script:
    - npm install

type-check-job:
  stage: type-check
  tags:
    - elevation-app
  cache:
    <<: *node_modules-cache
    policy: pull
  script:
    - npm run type-check

eslint-job:
  stage: lint
  tags:
    - elevation-app
  cache:
    <<: *node_modules-cache
    policy: pull
  script:
    - npm run lint

build-docker-image-job:
  stage: build-docker-image
  tags:
    - elevation-app
  image: docker:24.0.7
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
  services:
    - docker:24.0.7-dind
  artifacts:
    paths:
      - elevation-app.tar
  script:
    - docker info
    - docker build --target production -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} .
    - docker save -o elevation-app.tar ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}
