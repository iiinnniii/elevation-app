stages:
  - install
  - build
  - lint
  #- test
  - build-docker-image
  - e2e
  - push-docker-image

.cache: &cache
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - node_modules
    - .pnpm-store
    - cache/Cypress
  policy: pull

default:
  image: cypress/browsers

variables:
  CYPRESS_CACHE_FOLDER: '$CI_PROJECT_DIR/cache/Cypress'

.install_pnpm: &install_pnpm
  # Define where pnpm should be installed. The install script below respects this environment variable.
  - export PNPM_HOME="/usr/src/app/.pnpm-store"
  # Add pnpm to the PATH
  - export PATH="$PNPM_HOME:$PATH"
  # Install pnpm
  - wget -qO- https://get.pnpm.io/install.sh | ENV="$HOME/.bashrc" SHELL="$(which bash)" bash -
  # Use the `which npm` command to find the npm path and disable it
  - mv "$(which npm)" "$(which npm)-disabled"

install-job:
  stage: install
  tags:
    - elevation-app
  cache:
    <<: *cache
    policy: pull-push
  before_script:
    - *install_pnpm
  script:
    - echo "A little debugging if everything is fine"
    - echo "Current working directory is $(pwd)"
    - echo "Lets look into the root of the docker container, no /pnmp should be there"
    - ls -la /
    - echo "Lets look into the project directory .pnpm-store there?"
    - ls -la
    - echo "Lets check the links in node_modules"
    - ls -la node_modules/
    - echo "Lets get the inode of the react hardlink"
    - ls -li node_modules/.pnpm/react@19.0.0/node_modules/react
    - INODE=$(ls -li node_modules/.pnpm/react@19.0.0/node_modules/react | awk 'NR==3 {print $1}')
    - echo "The inode is $INODE"
    - echo "Lets check if everything is palletti"
    - find / -xdev -inum $INODE
    - pnpm install --frozen-lockfile

# Note: The build job also performs type-checking
build-job:
  stage: build
  tags:
    - elevation-app
  cache:
    <<: *cache
  before_script:
    - *install_pnpm
  script:
    - pnpm run build

eslint-job:
  stage: lint
  tags:
    - elevation-app
  cache:
    <<: *cache
    policy: pull
  before_script:
    - *install_pnpm
  script:
    - pnpm run lint

build-docker-image-job:
  stage: build-docker-image
  tags:
    - elevation-app
  image: docker:24.0.7
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: '/certs'
  services:
    - docker:24.0.7-dind
  artifacts:
    paths:
      - elevation-app.tar
  before_script: []
  script:
    - docker info
    - docker build --target production -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} .
    - docker save -o elevation-app.tar ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}

e2e-test-job:
  stage: e2e
  tags:
    - elevation-app
  image: docker:24.0.7
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: '/certs'
  services:
    - docker:24.0.7-dind
  before_script: []
  script:
    - docker load -i elevation-app.tar
    - docker image ls
    - rm elevation-app.tar
    - touch .env.e2e-test.ci
    - echo REMOTE_URL="elevation-app-server" >> .env.e2e-test.ci
    - echo PORT="80" >> .env.e2e-test.ci
    - cat .env.e2e-test.ci
    - echo "CI_REGISTRY_IMAGE ${CI_REGISTRY_IMAGE}"
    - echo "CI_COMMIT_SHA ${CI_COMMIT_SHA}"
    - docker build --target development -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}-test-e2e .
    - docker network create elevation-app-network
    - docker run -d --rm --network=elevation-app-network --name=elevation-app-server ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}
    - docker run -t --rm --network=elevation-app-network ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}-test-e2e pnpm run test

push-docker-image-job:
  stage: push-docker-image
  tags:
    - elevation-app
  image: docker:24.0.7
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: '/certs'
    ROOT_CA_CERTIFICATE: '${CA_CERTIFICATE}' # Workaround for Variables from 'Settings > CI/CD > Variables' are not expanded within services:[]:command https://gitlab.com/gitlab-org/gitlab-runner/-/issues/3808
  services:
    - name: docker:24.0.7-dind
      command:
        - /bin/sh
        - -c
        - echo "$ROOT_CA_CERTIFICATE" > /usr/local/share/ca-certificates/ca.crt && update-ca-certificates && dockerd-entrypoint.sh || exit
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
  before_script: []
  script:
    - docker load -i elevation-app.tar
    - docker image ls
    - echo "IMPORTANT! The following docker login command will cause a WARNING, but this warning is harmless, because the container created from the docker executor gets removed after the pipeline is finished and /root/.docker/config.json does not end up in the image which gets created via docker build in this job."
    - echo "${CONTAINER_REGISTRY_PASSWORD:?}" | docker login "${CONTAINER_REGISTRY_SERVER:?}" --password-stdin --username "${CONTAINER_REGISTRY_USERNAME:?}"
    - >
      if [ "${CI_COMMIT_BRANCH}" == "production" ]; then
        docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
        docker image ls
        docker push ${CI_REGISTRY_IMAGE}:latest
      else
        docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} ${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}-latest
        docker image ls
        docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_BRANCH}-latest
      fi
