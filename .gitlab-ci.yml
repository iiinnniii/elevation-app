stages:
  - install
  - type-check
  - lint
  - test
  - build
  - e2e
  - package

default:
  image: cypress/browsers
  before_script:
    - npm install

variables:
  CYPRESS_CACHE_FOLDER: '$CI_PROJECT_DIR/cache/Cypress'

install-job:
  stage: install
  tags:
    - elevation-app
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
      - cache/Cypress
    policy: pull-push
  script:
    - npm install

type-check-job:
  stage: type-check
  tags:
    - elevation-app
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
      - cache/Cypress
    policy: pull
  script:
    - npm run type-check

eslint-job:
  stage: lint
  tags:
    - elevation-app
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
      - cache/Cypress
    policy: pull
  script:
    - npm run lint

build-job:
  stage: build
  tags:
    - elevation-app
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
      - cache/Cypress
    policy: pull
  script:
    - npm run build

# Better would be to test the actually prod docker image which then gets also pushed into the registry. Since it is not necessary for this demo I excluded this code.
e2e-test-job:
  stage: e2e
  tags:
    - elevation-app
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
      - cache/Cypress
    policy: pull
  script:
    - npm run dev &
    - npm run test
